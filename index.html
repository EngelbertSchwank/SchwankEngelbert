<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Digitale Bewerbungswebsite</title>

  <!-- Montserrat (Google Fonts) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root{
      /* Header */
      --header-bg: #58852C;   /* dunkles Olivgrün */
      --name-color:#F3F1E8;   /* Name im Header */

      /* Text */
      --text:#2B2B2B;
      --font: "Montserrat", system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;

      /* Layout */
      --pad-x: clamp(14px, 3vw, 28px);
      --pad-y: clamp(12px, 2.2vw, 22px);
      --name-size: clamp(34px, 4.2vw, 60px);

      /* Baumgröße (unter dem Header) */
      --tree-height: clamp(200px, 32vw, 420px);
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family: var(--font);
      color: var(--text);
      background:#fff;
    }

    /* ===== HEADER (einfarbig, nur Name) ===== */
    header.hero{
      background: var(--header-bg);
      padding: var(--pad-y) var(--pad-x);
      border-bottom: 1px solid rgba(0,0,0,0.12);
    }

    .hero-inner{
      max-width: 900px;
      margin: 0 auto;
      text-align: center;
    }

    .hero-name{
      margin:0;
      font-size: var(--name-size);
      line-height: 1.0;
      font-weight: 900;
      letter-spacing: -0.02em;
      color: var(--name-color);
      text-shadow: 0 1px 1px rgba(0,0,0,0.25);
    }

    /* ===== BAUM (unter dem Header, links) ===== */
    .tree-band{
      background: #ffffff;
      padding: 10px 0 20px 0;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }

    .tree-inner{
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start; /* bleibt links */
      padding: 0 var(--pad-x);
    }

    img.tree{
      height: var(--tree-height);
      width: auto;
      display:block;
      flex: 0 0 auto;
      filter: drop-shadow(0 1px 0 rgba(0,0,0,0.05));
    }

    /* ===== INHALT ===== */
    main{
      max-width: 900px;
      margin: auto;
      padding: 30px 20px 60px;
    }

    .section{
      margin-top: 25px;
      padding: 20px;
      border: 1px solid #e9e9e9;
      border-radius: 12px;
      background: #fff;
    }

    h2{
      margin-top: 0;
      font-weight: 800;
      letter-spacing: -0.01em;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 520px){
      img.tree{ height: clamp(150px, 40vw, 300px); }
    }

    @media (max-width: 380px){
      header.hero{ text-align:center; }
      /* Baum bleibt links – wenn du ihn auf Mini-Screens zentrieren willst, aktiviere:
         .tree-inner{ justify-content: center; }
      */
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header class="hero">
    <div class="hero-inner">
      <h1 class="hero-name">DEIN NAME</h1>
    </div>
  </header>

  <!-- BAUM (links unter Header) -->
  <section class="tree-band" aria-label="Olivenbaum">
    <div class="tree-inner">
      <img class="tree"
           src="./Olive_Tree_vector_background_1_.svg"
           alt="Olivenbaum" />
    </div>
  </section>

  <!-- INHALT -->
  <main>
    <section class="section">
      <h2>Über mich</h2>
      <p>Kurzprofil über Erfahrung, Werte und Stärken.</p>
    </section>

    <section class="section">
      <h2>Erfahrung</h2>
      <p>Berufliche Stationen und Verantwortungsbereiche.</p>
    </section>

    <section class="section">
      <h2>Fähigkeiten</h2>
      <p>Projekt- &amp; Budgetverantwortung • Führung • Qualitätsmanagement • Digitalisierung</p>
    </section>

    <section class="section">
      <h2>Kontakt</h2>
      <p>E-Mail • LinkedIn • Telefonnummer</p>
    </section>
  </main>

</body>
</html>
