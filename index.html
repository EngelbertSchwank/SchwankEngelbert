<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Digitale Bewerbungswebsite</title>

  <style>
    :root{
      /* Exakt aus deinem SVG-Verlauf */
      --bg-olive-light: #F1F1E7; /* stop 0 */
      --bg-olive-dark:  #DCDFC5; /* stop 1 */

      /* Baum-Grün (aus deinem SVG, z.B. #58852c) */
      --olive-green: #58852C;

      /* Text */
      --text: #2B2B2B;
      --muted: #4A4A4A;

      /* Name in Baum-Farbe */
      --name-color: var(--olive-green);
    }

    *{ box-sizing: border-box; }

    body{
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
      background: #ffffff;
    }

    /* ===== Header / Hero ===== */
    header.hero{
      /* Bereich, wo der Baum ist: exakt dein Verlauf */
      background: radial-gradient(circle, var(--bg-olive-light) 0%, var(--bg-olive-dark) 100%);

      display: flex;
      align-items: center;
      justify-content: flex-start;

      gap: clamp(14px, 2vw, 26px);
      padding: clamp(14px, 2.2vw, 30px);

      /* flexible Höhe: nicht zu hoch, aber wirkt gut auf großen Screens */
      min-height: clamp(110px, 16vw, 190px);

      border-bottom: 1px solid rgba(0,0,0,0.06);
    }

    /* Baum links */
    .hero-tree{
      flex: 0 0 auto;
      display: block;

      /* responsive: wächst/schrumpft je nach Display */
      height: clamp(78px, 12vw, 160px);
      width: auto;

      /* Sicherheitslimit */
      max-width: 240px;
    }

    /* Text rechts */
    .hero-text{
      flex: 1 1 auto;
      min-width: 0; /* wichtig für responsive */
    }

    .hero-name{
      margin: 0;
      font-weight: 850;
      letter-spacing: 0.2px;
      line-height: 1.05;

      /* Name größer, responsive */
      font-size: clamp(26px, 3.2vw, 44px);

      /* gewünschte Schriftfarbe */
      color: var(--name-color);
    }

    .hero-subtitle{
      margin: 8px 0 0 0;
      max-width: 75ch;

      color: var(--muted);
      font-size: clamp(14px, 1.35vw, 18px);
      line-height: 1.35;
    }

    /* ===== Inhalt ===== */
    main{
      max-width: 980px;
      margin: 0 auto;
      padding: 28px 18px 60px;
    }

    .section{
      margin-top: 26px;
      padding: 18px;
      border-radius: 14px;
      border: 1px solid #e9e9e9;
      background: #ffffff;
    }

    .section h2{
      margin: 0 0 10px 0;
      font-size: 20px;
    }

    /* ===== Mobile Feinschliff ===== */
    @media (max-width: 520px){
      header.hero{
        gap: 12px;
        padding: 14px;
      }
      .hero-tree{
        height: 74px;
      }
      .hero-subtitle{
        margin-top: 6px;
      }
    }
  </style>
</head>

<body>

  <header class="hero">
    <!-- ✅ So wird der Baum wirklich angezeigt -->
    <img class="hero-tree"
         src="Olive_Tree_tree_only.svg"
         alt="Olivenbaum (Logo)"
         loading="eager" />

    <div class="hero-text">
      <h1 class="hero-name">DEIN NAME</h1>
      <p class="hero-subtitle">
        Kurzprofil / Positionierung – z. B. Geschäftsführung • Kaufmännische Leitung • QM • Organisation & Prozesse
      </p>
    </div>
  </header>

  <main>
    <section class="section">
      <h2>Über mich</h2>
      <p>…</p>
    </section>

    <section class="section">
      <h2>Erfahrung</h2>
      <p>…</p>
    </section>

    <section class="section">
      <h2>Fähigkeiten</h2>
      <p>…</p>
    </section>

    <section class="section">
      <h2>Kontakt</h2>
      <p>…</p>
    </section>
  </main>

</body>
</html>
``
