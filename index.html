<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vorname Nachname</title>

  <style>
    :root{
      --bg: #0f1412;
      --text: #f3f5f4;
      --maxw: 1200px;
      --radius: 18px;
      --border: rgba(255,255,255,0.10);
      --glass: rgba(255,255,255,0.06);
      --shadow: 0 18px 60px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.08);
    }

    *{ box-sizing: border-box; }

    body{
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 600px at 20% 0%, rgba(183,197,138,0.18), transparent 55%),
        radial-gradient(900px 450px at 80% 10%, rgba(255,255,255,0.06), transparent 60%),
        var(--bg);
      min-height: 100svh;
      display: flex;
      flex-direction: column;
    }

    header{
      padding: clamp(14px, 2.2vw, 22px) 18px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.45), rgba(0,0,0,0.10));
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    header .wrap,
    main .wrap{
      max-width: var(--maxw);
      margin: 0 auto;
      width: 100%;
    }

    /* Header: nur Name */
    h1{
      margin: 0;
      font-weight: 900;
      letter-spacing: 0.6px;
      font-size: clamp(34px, 4.6vw, 64px);
      line-height: 1.02;
    }

    main{
      flex: 1;
      display: flex;
      align-items: center;
      padding: clamp(12px, 2.6vw, 28px) 18px;
    }

    .card{
      position: relative;
      overflow: hidden;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      background: var(--glass);
    }

    /* ✅ Baum größer: mehr Höhe + volle Breite
       - contain: nichts wird abgeschnitten (wichtig bei SVG)
       - treeZoom: optischer Zoom ohne Verzerrung
    */
    .tree{
      width: 100%;
      height: min(86vh, 920px);   /* <-- größer als zuvor */
      display: block;
      object-fit: contain;        /* keine Teile abschneiden */
      object-position: center;
      transform: scale(1.08);     /* leichter Zoom */
      transform-origin: center;
      background:
        radial-gradient(1200px 700px at 45% 40%, rgba(183,197,138,0.12), transparent 60%),
        linear-gradient(to top, rgba(0,0,0,0.72), rgba(0,0,0,0.08) 60%, rgba(0,0,0,0.00));
    }

    /* Optional: leichte Abdunklung/Vignette – kein Text */
    .overlay{
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(1200px 700px at 50% 50%, rgba(0,0,0,0.08), transparent 55%),
        linear-gradient(to top, rgba(0,0,0,0.55), rgba(0,0,0,0.05) 60%, rgba(0,0,0,0.00));
    }

    /* Mobile: noch etwas höher, damit Baum dominiert */
    @media (max-width: 520px){
      .tree{
        height: min(88vh, 780px);
        transform: scale(1.12);
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="wrap">
      <h1>Vorname Nachname</h1>
    </div>
  </header>

  <main>
    <div class="wrap">
      <section class="card" aria-label="Olivenbaum">
        <!-- ✅ SVG korrekt laden (Datei muss im selben Ordner liegen) -->
        <img
          class="tree"
          src="./Olive_Tree_vector_background_1_.svg"
          alt="Olivenbaum"
          loading="eager"
        />
        <div class="overlay"></div>
      </section>
    </div>
  </main>
</body>
</html>
