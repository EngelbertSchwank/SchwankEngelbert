<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Digitale Bewerbungswebsite</title>

  <style>
    :root{
      /* Exakt aus deinem SVG-Verlauf (radialGradient18) */
      --bg-olive-light:#F1F1E7;
      --bg-olive-dark:#DCDFC5;

      /* Baum-Grün */
      --olive-green:#58852C;

      /* Text */
      --text:#2B2B2B;

      /* Abstände / Größen */
      --pad-x: clamp(14px, 3vw, 28px);
      --pad-y: clamp(12px, 2.2vw, 22px);

      --name-size: clamp(34px, 4.2vw, 60px);

      /* Baumgröße im Bereich darunter */
      --tree-height: clamp(120px, 22vw, 240px);
      /* kleiner: clamp(90px, 16vw, 170px); */
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
      background:#fff;
    }

    /* ===== HEADER: nur Name (ohne Subtitle) ===== */
    header.hero{
      background: radial-gradient(circle, var(--bg-olive-light) 0%, var(--bg-olive-dark) 100%);
      padding: var(--pad-y) var(--pad-x);
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }

    .hero-inner{
      max-width: 900px;
      margin: 0 auto;
    }

    .hero-name{
      margin:0;
      font-size: var(--name-size);
      line-height: 1.0;
      color: var(--olive-green);
      font-weight: 850;
      letter-spacing: -0.02em;
    }

    /* ===== BAUM-BEREICH darunter ===== */
    .tree-band{
      background: radial-gradient(circle, var(--bg-olive-light) 0%, var(--bg-olive-dark) 100%);
      padding: clamp(10px, 2vw, 18px) var(--pad-x) clamp(14px, 3vw, 26px);
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }

    .tree-inner{
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start; /* Baum links */
    }

    img.tree{
      height: var(--tree-height);
      width: auto;
      display:block;
      flex: 0 0 auto;
      filter: drop-shadow(0 1px 0 rgba(0,0,0,0.05));
    }

    /* ===== MAIN CONTENT ===== */
    main{
      max-width: 900px;
      margin: auto;
      padding: 30px 20px 60px;
    }

    .section{
      margin-top: 25px;
      padding: 20px;
      border: 1px solid #e9e9e9;
      border-radius: 12px;
      background: #fff;
    }

    h2{ margin-top: 0; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 520px){
      img.tree{ height: clamp(110px, 34vw, 190px); }
    }

    @media (max-width: 380px){
      .tree-inner{ justify-content: center; }
      header.hero{ text-align:center; }
    }
  </style>
</head>

<body>

  <!-- HEADER (nur Name) -->
  <header class="hero">
    <div class="hero-inner">
      <h1 class="hero-name">DEIN NAME</h1>
    </div>
  </header>

  <!-- BAUM DARUNTER -->
  <section class="tree-band" aria-label="Olivenbaum">
    <div class="tree-inner">
      <!-- ✅ SVG-Datei einbinden (Pfad ggf. anpassen) -->
      <img class="tree"
           src="./Olive_Tree_vector_background_1_.svg"
           alt="Olivenbaum" />

      <!-- Wenn die Datei in /assets/ liegt, nimm stattdessen:
      <img class="tree" src="./assets/Olive_Tree_vector_background_1_.svg" alt="Olivenbaum" />
      -->
    </div>
  </section>

  <!-- INHALT -->
  <main>
    <section class="section">
      <h2>Über mich</h2>
      <p>Kurzprofil über Erfahrung, Werte und Stärken.</p>
    </section>

    <section class="section">
      <h2>Erfahrung</h2>
      <p>Berufliche Stationen und Verantwortungsbereiche.</p>
    </section>

    <section class="section">
      <h2>Fähigkeiten</h2>
      <p>Projekt- &amp; Budgetverantwortung • Führung • Qualitätsmanagement • Digitalisierung</p>
    </section>

    <section class="section">
      <h2>Kontakt</h2>
      <p>E-Mail • LinkedIn • Telefonnummer</p>
    </section>
  </main>

</body>
</html>
